<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0d;
    --paper: #f5f2ed;
    --cream: #ede9e1;
    --accent: #c84b2f;
    --accent-dark: #a33520;
    --muted: #7a7267;
    --border: #d4cfc6;
    --white: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(200,75,47,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(15,14,13,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: var(--ink);
    border-radius: 14px;
    margin-bottom: 1rem;
  }

  .logo-mark svg { width: 28px; height: 28px; fill: var(--paper); }

  .logo-area h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .logo-area p {
    font-size: 0.875rem;
    color: var(--muted);
    margin-top: 0.25rem;
    font-weight: 300;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.1em;
  }

  input[type="password"]:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.875rem;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.98); }

  .error {
    display: none;
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--accent);
    text-align: center;
  }

  .setup-note {
    margin-top: 1.25rem;
    padding: 0.875rem 1rem;
    background: var(--cream);
    border-radius: 10px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .setup-note strong { color: var(--ink); }

  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-area">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6H16V4C16 2.9 15.1 2 14 2H10C8.9 2 8 2.9 8 4V6H4C2.9 6 2 6.9 2 8V20C2 21.1 2.9 22 4 22H20C21.1 22 22 21.1 22 20V8C22 6.9 21.1 6 20 6ZM10 4H14V6H10V4ZM20 20H4V8H20V20Z"/>
        <path d="M7 12H17V14H7V12ZM7 16H13V18H7V16Z"/>
      </svg>
    </div>
    <h1>Job Tracker</h1>
    <p>Your personal job search command center</p>
  </div>

  <div class="card">
    <label for="pwd">Passphrase</label>
    <input type="password" id="pwd" placeholder="Enter your passphrase" autocomplete="current-password" />
    <button class="btn" onclick="tryLogin()">Sign In</button>
    <p class="error" id="err">Incorrect passphrase. Try again.</p>

    <div class="setup-note" id="setup-note">
      <strong>First time?</strong> Your passphrase is whatever you set in <code>config.js</code>. Default is <strong>changeme123</strong> — update it before sharing the link.
    </div>
  </div>

  <p class="footer">Data stored privately in your browser · No account needed</p>
</div>

<script>
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function tryLogin() {
    const val = document.getElementById('pwd').value.trim();
    if (!val) return;

    // Load passphrase hash from config.js (sets window.APP_PASS_HASH)
    const hash = await sha256(val);

    if (hash === window.APP_PASS_HASH) {
      sessionStorage.setItem('jt_auth', '1');
      window.location.href = 'index.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pwd').value = '';
    }
  }

  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  // Redirect if already logged in
  if (sessionStorage.getItem('jt_auth') === '1') {
    window.location.href = 'index.html';
  }
</script>
<script src="config.js"></script>
</body>
</html>
